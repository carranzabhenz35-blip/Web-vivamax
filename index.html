<!DOCTYPE html>
<html>
<head>
<title>🔥 BHENZ VIVAMAX</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  margin: 0;
}

h1 {
  text-align: center;
  padding: 10px;
}

.album-container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

.album {
  width: 150px;
  text-align: center;
  cursor: pointer;
}

.album img {
  width: 100%;
  border-radius: 15px;
}

.movies {
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

.movie {
  width: 120px;
  text-align: center;
  cursor: pointer;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

video {
  width: 95%;
  display: block;
  margin: 10px auto;
  border-radius: 10px;
}

.back {
  padding: 10px;
  cursor: pointer;
  color: red;
}
</style>

</head>

<body>

<h1>🔥 BHENZ FLIX</h1>

<!-- PLAYER -->
<video id="player" controls></video>

<!-- ALBUM VIEW -->
<div id="albums" class="album-container">

  <div class="album" onclick="openAlbum()">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>VIVAMAX</p>
  </div>

</div>

<!-- MOVIE LIST -->
<div id="movieSection" style="display:none;">

  <div class="back" onclick="goBack()">⬅ Back</div>

  <div class="movies" id="movies">

    <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/6f823oaqpc0l20q6obkk0/Balik-Taya.mkv')">
      <img src="https://i.imgur.com/pI891mM.png">
      <p>Balik Taya</p>
    </div>

    <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/p694q7kgkijikwuotn7j8/Balinsasayaw.mp4')">
      <img src="https://i.imgur.com/pI891mM.png">
      <p>Balinsasayaw</p>
    </div>

    <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/93im18niuw9bk8wl64hoz/Bisyo.mp4')">
      <img src="https://i.imgur.com/pI891mM.png">
      <p>Bisyo</p>
    </div>

    <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/qq4vux3v34kmapc9uub2s/Butas.mp4')">
      <img src="https://i.imgur.com/pI891mM.png">
      <p>Butas</p>
    </div>

  </div>

</div>

<script>

function openAlbum() {
  document.getElementById("albums").style.display = "none";
  document.getElementById("movieSection").style.display = "block";
  document.getElementById("movies").style.display = "flex";
}

function goBack() {
  document.getElementById("albums").style.display = "flex";
  document.getElementById("movieSection").style.display = "none";
}

function playVideo(link) {
  var player = document.getElementById("player");
  player.src = link;
  player.play();
}

</script>

</body>
</html>
