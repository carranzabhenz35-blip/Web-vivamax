<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>BHENZ FLIX</title><style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
}

h1{

  margin:0;
}

iframe{

</style></head><body><h1>🎬 BHENZ FLIX</h1><iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe><div class="grid"><div class="card" onclick="play(0)">

</div><div class="card" onclick="play(1)">

</div></div><script>
const movies = [
"https://drive.google.com/file/d/1cHAiirtSdelok9ClfZjUOr2AV_BTNhSI/preview",
"https://drive.google.com/file/d/1S2qv1u-r-8jfzA-VfZTlTuKChdTGOR5q/preview"
];

function play(i){
  document.getElementById("player").src = movies[i];
}
</script></body>
</html>
