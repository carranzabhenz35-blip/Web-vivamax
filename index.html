<!DOCTYPE html>
<html>
<head>
<title>🔥 BHENZ VIVAMAX</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  padding: 10px;
}

h2 {
  padding-left: 10px;
}

.search {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.album {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

.movie {
  width: 120px;
  text-align: center;
  cursor: pointer;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

video {
  width: 95%;
  display: block;
  margin: 10px auto;
  border-radius: 10px;
}
</style>

</head>

<body>

<h1>🔥 BHENZ VIVAMAX</h1>

<input class="search" placeholder="Search movie..." onkeyup="searchMovie(this.value)">

<!-- PLAYER -->
<video id="player" controls></video>

<!-- VIVAMAX ALBUM -->
<h2>🔥 VIVAMAX</h2>
<div class="album" id="movieList">

  <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/6f823oaqpc0l20q6obkk0/Balik-Taya.mkv')">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>Balik Taya</p>
  </div>

  <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/p694q7kgkijikwuotn7j8/Balinsasayaw.mp4')">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>Balinsasayaw</p>
  </div>

  <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/93im18niuw9bk8wl64hoz/Bisyo.mp4')">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>Bisyo</p>
  </div>

  <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/qq4vux3v34kmapc9uub2s/Butas.mp4')">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>Butas</p>
  </div>

  <div class="movie" onclick="playVideo('https://dl.dropboxusercontent.com/scl/fi/5xuu0oxzf0e342r7ddxqx/Call-me-Alma.mkv')">
    <img src="https://i.imgur.com/pI891mM.png">
    <p>Call Me Alma</p>
  </div>

</div>

<script>

function playVideo(link) {
  var player = document.getElementById("player");
  player.src = link;
  player.play();
}

function searchMovie(value) {
  let movies = document.querySelectorAll(".movie");

  movies.forEach(m => {
    let title = m.innerText.toLowerCase();
    if (title.includes(value.toLowerCase())) {
      m.style.display = "block";
    } else {
      m.style.display = "none";
    }
  });
}

</script>

</body>
</html>
