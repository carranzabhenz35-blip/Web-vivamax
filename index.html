      0%{transform: scale(0.5); opacity:0;}

      100%{transform: scale(1); opacity:0;}

    /* SEARCH */
    #search{
      width:80%;
      padding:10px;
      margin:10px auto;
      display:block;
      border-radius:10px;

    }

    .grid {
      display:flex;
      flex-wrap:wrap;
      gap:15px;

    .card {
      width:160px;
      cursor:pointer;
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    .card p {
      text-align:center;
      font-size:14px;
    }

    video {
      width:90%;
      margin:20px auto;
      display:block;
      border-radius:10px;
    }

    #loading{
      text-align:center;
      display:none;
    }

  </style></head><body><!-- INTRO --><div id="intro">

<img src="https://i.imgur.com/eyvBqjc.png"><p>Manila by Night</p></div></div><p id="loading">Loading movie...</p><video id="player" controls autoplay></video>

<script>

// INTRO HIDE
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
},3000);

// PLAY FUNCTION
function play(url){
  const player = document.getElementById("player");
  const loading = document.getElementById("loading");

  loading.style.display = "block";
  player.src = url;

  player.onloadeddata = () => {
    loading.style.display = "none";
  };

  player.scrollIntoView({ behavior: "smooth" });
}

// SEARCH
function searchMovie(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for(let i=0;i<cards.length;i++){
    let title = cards[i].innerText.toLowerCase();
    cards[i].style.display = title.includes(input) ? "block" : "none";
  }
}

</script></body>
</html>
